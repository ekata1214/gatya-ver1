<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SSRオリパガチャ演出</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    body {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: center;
      min-height: 100%;
    }
    .side-panel {
      flex: 1 1 280px;
      min-width: 0;
      max-width: 360px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px 14px;
      background: #000;
      overflow-y: auto;
    }
    @media (min-width: 960px) {
      body.dev-ui .side-panel { display: flex; }
    }
    body:not(.dev-ui) .side-panel,
    body:not(.dev-ui) #compare-picker {
      display: none !important;
    }
    body:not(.dev-ui) #stage-wrap {
      width: min(100vw, calc(100vh * 1080 / 1920));
    }
    .side-panel__card {
      max-width: 280px;
      color: #ccc;
      font-family: system-ui, sans-serif;
      line-height: 1.55;
    }
    .side-panel__topic {
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
    }
    .side-panel__tag {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      margin-bottom: 4px;
    }
    .side-panel--before.is-active .side-panel__tag { color: #f87171; }
    .side-panel--after.is-active .side-panel__tag { color: #4ade80; }
    .side-panel__title {
      font-size: 18px;
      color: #fff;
      margin-bottom: 10px;
    }
    .side-panel__diagram {
      margin: 0 0 12px;
      border-radius: 8px;
      overflow: hidden;
    }
    .side-panel__diagram svg { display: block; width: 100%; height: auto; }
    .side-panel__summary { font-size: 13px; margin-bottom: 10px; }
    .side-panel__list {
      font-size: 12px;
      padding-left: 1.1em;
      margin-bottom: 10px;
      color: #aaa;
    }
    .side-panel__list li { margin-bottom: 4px; }
    .side-panel__meta, .side-panel__ref {
      font-size: 10px;
      color: #555;
    }
    .side-panel:not(.is-active) { opacity: 0.45; }
    .side-panel.is-active { opacity: 1; }
    #app-shell {
      flex: 1 1 auto;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: center;
      width: 100%;
      max-width: 100vw;
      height: 100vh;
      min-width: 0;
    }
    #stage-wrap {
      flex: 0 0 auto;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 左右パネル分を除いた幅でステージを確保（100vw 直指定だと潰れる） */
      width: min(calc(100vh * 1080 / 1920), calc(100vw - 560px));
      max-width: calc(100vh * 1080 / 1920);
    }
    @media (max-width: 959px) {
      #stage-wrap {
        width: min(100vw, calc(100vh * 1080 / 1920));
      }
    }
    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-height: 100vh;
      aspect-ratio: 1080 / 1920;
      overflow: hidden;
      background: #000;
    }
    #fire-bg,
    #ink-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #fire-bg {
      z-index: 0;
      background: #000;
      object-fit: cover;
      object-position: center center;
    }
    #ink-canvas {
      z-index: 1;
      mix-blend-mode: multiply;
      opacity: 0;
    }
    #cards-canvas,
    #countdown-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #cards-canvas { z-index: 5; will-change: filter; }
    #countdown-canvas { z-index: 100; opacity: 0; }
    #darken,
    #whiteout {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
    }
    #darken { z-index: 150; background: #000; }
    #whiteout { z-index: 250; background: #fff; }
    #ssr-layer {
      position: absolute;
      inset: 0;
      z-index: 90;
      pointer-events: none;
      opacity: 1;
      perspective: 900px;
      perspective-origin: 50% 45%;
    }
    #white-ssr {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      opacity: 0;
    }
    #ssr-card-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 1;
      width: min(78%, 720px);
      pointer-events: none;
      opacity: 0;
      overflow: visible;
      transform-style: preserve-3d;
      transform-origin: 50% 50%;
    }
    #ssr-card-canvas {
      display: block;
      pointer-events: none;
    }
    #replay {
      position: absolute;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 28px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #e63946, #b91c1c);
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 15px;
      cursor: pointer;
      z-index: 1000;
      pointer-events: auto;
    }
    #replay:active { transform: translateX(-50%) scale(0.96); }
    #compare-picker {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 1001;
      pointer-events: auto;
    }
    #compare-picker button {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    #compare-picker button.active {
      background: rgba(230, 57, 70, 0.85);
      border-color: transparent;
    }
    #compare-picker button[data-mode="after"].active {
      background: rgba(74, 222, 128, 0.85);
    }
    #file-warn {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.92);
      color: #fff;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: system-ui, sans-serif;
      text-align: center;
      line-height: 1.6;
    }
    #file-warn code { background: #222; padding: 2px 6px; border-radius: 4px; }
    body.is-file-protocol #file-warn { display: flex; }
  </style>
</head>
<body>
  <div id="file-warn" role="alert">
    <div>
      <p>ガチャ演出SSRデモサイト</p>
    </div>
  </div>

  <div id="app-shell">
    <aside id="side-left" class="side-panel side-panel--before" aria-label="before 説明"></aside>
    <div id="stage-wrap">
    <div id="stage">
      <video id="fire-bg" autoplay muted loop playsinline webkit-playsinline preload="auto" crossorigin="anonymous">
        <source src="./re fire2.mp4" type="video/mp4" />
      </video>
      <canvas id="ink-canvas"></canvas>
      <canvas id="cards-canvas"></canvas>
      <canvas id="countdown-canvas"></canvas>
      <div id="darken" aria-hidden="true"></div>
      <div id="ssr-layer" aria-hidden="true">
        <video id="white-ssr" autoplay muted loop playsinline webkit-playsinline preload="auto">
          <source src="./white ssr.mp4" type="video/mp4" />
        </video>
        <div id="ssr-card-wrap">
          <canvas id="ssr-card-canvas"></canvas>
        </div>
      </div>
      <div id="whiteout" aria-hidden="true"></div>
      <button id="replay" type="button">ガチャを引く</button>
      <div id="compare-picker" role="group" aria-label="before / after 比較">
        <button type="button" data-mode="before">before</button>
        <button type="button" data-mode="after" class="active">after</button>
      </div>
    </div>
    </div>
    <aside id="side-right" class="side-panel side-panel--after is-active" aria-label="after 説明"></aside>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/CustomEase.min.js"></script>
  <script type="module">
    if (location.protocol === 'file:') {
      document.body.classList.add('is-file-protocol');
    } else {
      /** false = 本番（比較UI非表示・初回は「ガチャを引く」） / true = 開発者向け before/after */
      const SHOW_DEV_UI = false;
      document.body.classList.toggle('dev-ui', SHOW_DEV_UI);

      const ASSET_V = '20260628-replay-ux';
      try {
      const { initGatyaShow } = await import(`./src/gatya-unified.mjs?v=${ASSET_V}`);

      let compareMode = 'after';
      let panelCtrl = null;

      if (SHOW_DEV_UI) {
        const { mountComparePanels } = await import(`./src/compare-panels.mjs?v=${ASSET_V}`);
        const comparePicker = document.getElementById('compare-picker');
        const compareButtons = [...comparePicker.querySelectorAll('button')];

        panelCtrl = mountComparePanels({
          leftEl: document.getElementById('side-left'),
          rightEl: document.getElementById('side-right'),
        });

        function selectCompare(mode) {
          if (mode !== 'before' && mode !== 'after') return;
          compareMode = mode;
          compareButtons.forEach((btn) => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
          });
          panelCtrl.setActive(mode);
          show.playShow(mode);
        }

        compareButtons.forEach((btn) => {
          btn.addEventListener('click', () => selectCompare(btn.dataset.mode));
        });
      }

      const show = await initGatyaShow({
        stageEl: document.getElementById('stage'),
        cardsCanvas: document.getElementById('cards-canvas'),
        countdownCanvas: document.getElementById('countdown-canvas'),
        inkCanvas: document.getElementById('ink-canvas'),
        fireVideo: document.getElementById('fire-bg'),
        whiteSsrVideo: document.getElementById('white-ssr'),
        ssrCard: document.getElementById('ssr-card-wrap'),
        ssrCardCanvas: document.getElementById('ssr-card-canvas'),
        ssrLayer: document.getElementById('ssr-layer'),
        darkenEl: document.getElementById('darken'),
        whiteoutEl: document.getElementById('whiteout'),
        replayBtn: document.getElementById('replay'),
        resolveGatherMode: () => (SHOW_DEV_UI ? compareMode : 'after'),
        autoPlay: SHOW_DEV_UI,
      });

      if (SHOW_DEV_UI) {
        compareMode = 'after';
        panelCtrl.setActive('after');
        show.playShow('after');
      } else {
        show.setGatherMode('after');
      }
      } catch (err) {
        console.error(err);
        const warn = document.getElementById('file-warn');
        warn.style.display = 'flex';
        warn.querySelector('div').innerHTML = '<p>読み込みに失敗しました</p><p style="font-size:13px;color:#ccc;margin-top:10px">しばらくしてからページを再読み込みしてください。</p>';
      }
    }
  </script>
</body>
</html>
